apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumina-api
  namespace: lumina-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lumina-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: lumina-api
    spec:
      containers:
        - name: api
          image: registry.lumina.ai/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: lumina-db-secrets
            - configMapRef:
                name: lumina-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-internal
  namespace: lumina-prod
spec:
  selector:
    app: lumina-api
  ports:
    - port: 80
      targetPort: 3000
