apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumina-gateway
  namespace: lumina-prod
spec:
  replicas: 5
  selector:
    matchLabels:
      app: lumina-gateway
  template:
    metadata:
      labels:
        app: lumina-gateway
    spec:
      containers:
        - name: gateway
          image: registry.lumina.ai/gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: NATS_URL
              value: "nats://nats-cluster.lumina-prod.svc:4222"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lumina-db-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-internal
  namespace: lumina-prod
spec:
  selector:
    app: lumina-gateway
  ports:
    - port: 80
      targetPort: 8080
