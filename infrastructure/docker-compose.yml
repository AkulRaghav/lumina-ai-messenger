version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina_pass
      POSTGRES_DB: lumina_db
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  nats:
    image: nats:2.10-alpine
    command: "-js"
    ports: ["4222:4222", "8222:8222"]

volumes:
  pgdata:
