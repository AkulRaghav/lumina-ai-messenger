name: Lumina CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install API Dependencies
        run: cd services/api && npm install
      - name: Lint & Test API
        run: cd services/api && npm run lint && npm run test

  build-and-push-flutter:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v3
      - name: Setup Java (for Flutter)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      - name: Build Flutter Web (for deployment)
        run: cd clients/mobile && flutter pub get && flutter build web --release
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: flutter-web-build
          path: clients/mobile/build/web

  deploy-k8s:
    runs-on: ubuntu-latest
    needs: build-and-push-flutter
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Deploy to Kubernetes
        run: echo "Deploying to Kubernetes cluster..."
        # In production: kubectl apply -f infrastructure/k8s/
